<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>1 Year Anniversary 💕</title>
<style>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Kanit:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Prompt:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden;background:#EEF6FF;font-family:'Prompt','Kanit',sans-serif;color:#1A2A50}

#cvs{position:fixed;inset:0;pointer-events:none;z-index:0}

/* NAV */
.nav{position:fixed;top:16px;left:50%;transform:translateX(-50%);z-index:300;display:flex;gap:8px;padding:8px 14px;background:rgba(255,255,255,.82);backdrop-filter:blur(20px);border-radius:40px;border:1px solid rgba(200,160,200,.25);box-shadow:0 4px 24px rgba(160,140,200,.12)}
.nb{width:36px;height:36px;border-radius:50%;border:1.5px solid rgba(220,160,200,.45);background:transparent;color:#3A5A8A;font-size:13px;cursor:pointer;transition:all .3s;font-family:inherit;display:flex;align-items:center;justify-content:center}
.nb:hover{background:rgba(240,180,210,.25);border-color:#F09AC0}
.nb.active{background:linear-gradient(135deg,rgba(240,180,210,.55),rgba(180,210,245,.45));border-color:#F09AC0;color:#1A2A50;box-shadow:0 0 12px rgba(240,100,160,.2)}

/* ARROWS */
.arr{position:fixed;bottom:24px;z-index:300;width:50px;height:50px;border-radius:50%;border:1.5px solid rgba(220,160,200,.4);background:rgba(255,255,255,.75);backdrop-filter:blur(12px);cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;transition:all .35s;color:#3A5A8A;box-shadow:0 4px 16px rgba(160,140,200,.12)}
.arr:hover{background:rgba(240,180,210,.35);box-shadow:0 0 20px rgba(240,100,160,.22);transform:scale(1.1);border-color:#F09AC0}
#aL{left:calc(50% - 40px);transform:translateX(-100%)}
#aL:hover{transform:translateX(-100%) scale(1.1)}
#aR{left:calc(50% + 40px)}
.pind{position:fixed;bottom:34px;left:50%;transform:translateX(-50%);font-size:11px;color:#9AB0C8;z-index:300;letter-spacing:2px;pointer-events:none;font-family:'Kanit','Prompt',sans-serif}

/* PAGES */
.pages{display:flex;height:100vh;transition:transform .75s cubic-bezier(.86,0,.07,1)}
.pg{flex:0 0 100vw;width:100vw;height:100vh;overflow-y:auto;overflow-x:hidden;position:relative;scrollbar-width:thin;scrollbar-color:rgba(200,160,200,.3) transparent}
.pg::-webkit-scrollbar{width:3px}
.pg::-webkit-scrollbar-thumb{background:rgba(200,160,200,.3);border-radius:2px}

/* PAGE BG */
#p0{background:linear-gradient(150deg,#D8EEFF 0%,#FFD8EC 55%,#F0F6FF 100%)}
#p1{background:linear-gradient(140deg,#E8F4FF 0%,#F4FAFF 100%)}
#p2{background:linear-gradient(140deg,#FFF0F8 0%,#FFE8F4 100%)}
#p3{background:linear-gradient(140deg,#EEF4FF 0%,#E8F2FF 100%)}
#p4{background:linear-gradient(140deg,#FFF4FA 0%,#EEEEFF 100%)}

/* OVERLAY transition */
.ov{position:fixed;inset:0;background:linear-gradient(135deg,#CCE8FF,#FFDCEC);z-index:250;pointer-events:none;opacity:0;transition:opacity .22s}
.ov.on{opacity:1}

/* HERO */
.hi{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:80px 24px 100px}
.badge{background:rgba(255,255,255,.6);border:1px solid rgba(220,160,200,.35);border-radius:30px;padding:8px 28px;font-size:12px;letter-spacing:3px;display:inline-block;margin-bottom:22px;color:#5A78A8;font-family:'Kanit','Prompt',sans-serif;animation:fu .8s ease .2s both}
.ht{font-family:'Kanit','Prompt',sans-serif;font-size:52px;font-weight:300;letter-spacing:4px;line-height:1.2;margin-bottom:10px;color:#1A2A50;animation:fu .8s ease .4s both}
.ht em{font-style:italic;background:linear-gradient(135deg,#F09AC0,#9DC8F0);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hh{font-size:52px;margin:18px 0;display:inline-block;animation:hb 2s ease-in-out infinite}
.hdate{font-size:13px;color:#7890B0;letter-spacing:3px;margin-bottom:14px;font-family:'Kanit','Prompt',sans-serif;animation:fu .8s ease .6s both}
.hdesc{font-size:15px;color:#6880A0;line-height:2;max-width:380px;font-weight:300;animation:fu .8s ease .8s both}
.hhint{margin-top:36px;font-size:11px;color:#A8C0D8;animation:bounce 2.5s ease-in-out infinite,fu .8s ease 1s both;letter-spacing:2px}
.dots{display:flex;gap:8px;justify-content:center;margin-top:14px;animation:fu .8s ease 1.2s both}
.dots span{width:6px;height:6px;border-radius:50%;background:rgba(180,140,190,.25);transition:all .3s}
.dots span.a{background:#F09AC0;box-shadow:0 0 8px rgba(240,100,160,.3)}
@keyframes fu{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes hb{0%,100%{transform:scale(1)}14%{transform:scale(1.22)}28%{transform:scale(1.1)}42%{transform:scale(1.27)}70%{transform:scale(1)}}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(8px)}}

/* SEC INNER */
.si{padding:80px 24px 100px;max-width:1100px;margin:0 auto}
.stit{font-family:'Kanit','Prompt',sans-serif;font-size:38px;font-weight:300;letter-spacing:3px;color:#1A2A50;text-align:center;margin-bottom:6px;opacity:0;transform:translateY(14px);transition:all .55s ease}
.stit.vis{opacity:1;transform:none}
.sdiv{width:55px;height:1px;background:linear-gradient(90deg,transparent,#F09AC0,transparent);margin:10px auto 8px}
.ssub{text-align:center;font-size:13px;color:#7890B0;margin-bottom:5px;font-weight:300;letter-spacing:.5px}
.ah{text-align:center;font-size:11px;color:#B0C0D8;margin-bottom:14px;letter-spacing:1px}

/* PHOTO GRID — 5 cols × 6 rows = 30 */
.pgr{display:grid;grid-template-columns:repeat(6,1fr);gap:4px}
@media(max-width:700px){.pgr{grid-template-columns:repeat(3,1fr)}}
.pc{aspect-ratio:1;background:rgba(255,255,255,.55);border:1px solid rgba(200,160,200,.2);display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;overflow:hidden;cursor:pointer;transition:transform .3s ease,box-shadow .3s ease,border-color .3s ease}
.pc:hover{transform:scale(1.85);border-color:rgba(240,154,192,.7);z-index:50;box-shadow:0 12px 48px rgba(240,100,160,.3),0 0 0 3px rgba(255,255,255,.8)}
.pc:hover img{transform:scale(1)}
.pc img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;transition:transform .4s}
.pc:hover img{transform:scale(1.08)}
.pc .ico{font-size:16px;opacity:.25;pointer-events:none}
.pc .num{font-size:9px;color:#B0A8C0;pointer-events:none;margin-top:2px}
.pc input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}

/* MSG ROW */
.mrow{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:18px}
@media(max-width:700px){.mrow{grid-template-columns:1fr}}
.mb{background:rgba(255,255,255,.7);border-radius:14px;padding:14px;border:1px solid rgba(200,160,200,.2);transition:all .3s}
.mb:focus-within{border-color:rgba(240,154,192,.45);box-shadow:0 0 18px rgba(240,100,160,.08)}
.mb label{font-size:11px;color:#A090B8;display:block;margin-bottom:6px;letter-spacing:.5px;font-family:'Kanit','Prompt',sans-serif}
.mb textarea{width:100%;border:none;background:transparent;font-family:'Prompt','Kanit',sans-serif;font-size:13px;color:#2A3050;resize:none;min-height:78px;line-height:1.8;font-weight:300}
.mb textarea:focus{outline:none}

/* VIDEO — 6 cols */
.vgr{display:grid;grid-template-columns:repeat(6,1fr);gap:4px;max-width:1100px;margin:0 auto}
@media(max-width:700px){.vgr{grid-template-columns:repeat(2,1fr)}}
.vc{aspect-ratio:9/16;background:rgba(255,255,255,.55);border:1px solid rgba(160,190,220,.2);display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;overflow:hidden;cursor:pointer;transition:transform .3s ease,box-shadow .3s ease,border-color .3s ease;border-radius:8px}
.vc:hover{transform:scale(1.5);border-color:rgba(140,180,230,.7);z-index:50;box-shadow:0 12px 48px rgba(80,140,220,.3),0 0 0 3px rgba(255,255,255,.8)}
.vc .ico{font-size:18px;opacity:.25;pointer-events:none}
.vc .num{font-size:9px;color:#A0B8D0;pointer-events:none;margin-top:2px}
.vc video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;border-radius:7px}
.vc input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.vprog{position:absolute;bottom:0;left:0;height:3px;background:linear-gradient(90deg,#9DC8F0,#F09AC0);width:0%;transition:none;border-radius:0 0 7px 7px}
.vprog.run{transition:width linear}

.vdur{position:absolute;top:6px;right:8px;font-size:9px;color:rgba(255,255,255,.9);background:rgba(0,0,0,.22);padding:2px 6px;border-radius:6px;pointer-events:none}

/* FLOWER — single image */
.fsingle{max-width:480px;margin:0 auto;text-align:center}
.fcard{aspect-ratio:4/3;background:rgba(255,255,255,.6);border:2px dashed rgba(220,160,200,.3);border-radius:18px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;position:relative;overflow:hidden;transition:all .4s;max-width:480px;margin:0 auto}
.fcard:hover{border-color:rgba(240,154,192,.6);box-shadow:0 8px 32px rgba(240,100,160,.18);transform:scale(1.02)}
.fcard img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;border-radius:16px}
.fcard .ico{font-size:32px;opacity:.2;pointer-events:none}
.fcard .ftxt{font-size:13px;color:#C0A0C0;margin-top:8px;pointer-events:none}
.fcard input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.fmsg{margin-top:24px;text-align:center}
.fmsg textarea{width:100%;max-width:480px;border:1.5px solid rgba(220,160,200,.25);border-radius:14px;padding:18px;font-family:'Kanit','Prompt',sans-serif;font-size:18px;font-style:italic;color:#2A3050;background:rgba(255,255,255,.75);resize:none;text-align:center;line-height:1.9;min-height:80px;transition:border-color .3s}
.fmsg textarea:focus{outline:none;border-color:rgba(240,154,192,.5);box-shadow:0 0 20px rgba(240,100,160,.1)}
.fmsg small{display:block;font-size:10px;color:#C0B0D0;margin-top:6px;letter-spacing:1px}
</style>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Kanit:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Prompt:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
</head>
<body>

<canvas id="cvs"></canvas>
<div class="ov" id="ov"></div>

<nav class="nav">
  <button class="nb active" onclick="go(0)">1</button>
  <button class="nb" onclick="go(1)">2</button>
  <button class="nb" onclick="go(2)">3</button>
  <button class="nb" onclick="go(3)">4</button>
  <button class="nb" onclick="go(4)">5</button>
</nav>

<button class="arr" id="aL" onclick="prev()">←</button>
<div class="pind" id="pi">01 · 05</div>
<button class="arr" id="aR" onclick="next()">→</button>

<div class="pages" id="pages">

  <!-- HERO -->
  <div class="pg" id="p0">
    <div class="hi">
      <div class="ht">FIRST YEAR<br><em>ANNIVERSARY</em></div>
      <div class="hh">💕</div>
      <div class="hdate">02 JUNE 2026</div>
      <p class="hdesc">every moment with you is a day worth living</p>
      <div class="hhint">กด → หรือ swipe เพื่อดูต่อ</div>
      <div class="dots">
        <span class="a"></span><span></span><span></span><span></span><span></span>
      </div>
    </div>
  </div>

  <!-- ครึ่งปีแรก 15 รูป -->
  <div class="pg" id="p1">
    <div class="si">
      <div class="stit" id="t1">:)</div>
      <div class="sdiv"></div>
      <div class="pgr" id="g1"></div>
      <div class="mrow" style="display:flex;justify-content:center">
        <div class="mb" style="width:100%">
          <textarea>เป็นครึ่งปีแรกที่ดีมาก เธอหากิจกรรมทำตลอดซึ่งเค้าชอบมากๆ ถือว่าผ่านอะไรมามากอยู่ ในเวลาอันสั้นขนาดนี้ เรื่องใหญ่ๆ กลายเป็นเล็กน้อยเลย ผ่านไปง่ายมากเพราะมีบี๋อยู่ด้วย เวลาจะไปหาบี๋ การขับรถ หรือการที่เค้าไปนั่งทำงานนานๆ ใน สตาบัค เพื่อรอบี๋ทำงาน ไม่ได้น่าเบื่อเท่าไหร่ ละแปลกกว่าคือปกติเค้าจะไม่ชอบเดินห้างเอามากๆ เพราะมันน่าเบื่อสุดๆ งงมากว่า ทุกวันนี้เดินห้างไม่ได้น่าเบื่อเลย ถ้าบี๋เดินด้วย💕</textarea>
        </div>
      </div>
    </div>
  </div>

  <!-- ครึ่งปีหลัง 15 รูป -->
  <div class="pg" id="p2">
    <div class="si">
      <div class="stit" id="t2">;)</div>
      <div class="sdiv"></div>
      <div class="pgr" id="g2"></div>
      <div class="mrow" style="display:flex;justify-content:center">
        <div class="mb" style="width:100%">
          <textarea>ครึ่งปีหลังมันก็ดีมากๆ เช่นกัน อะไรที่ไม่เคยได้ทำ ไม่เคยได้เจอ เธอทำให้เค้าได้ทำ ได้เจอหมดเลย ขอบคุณที่ได้เจอบี๋จริงๆ เธอทำให้เค้าได้เป็นตัวเอง ในเวอร์ชั่นที่ดี(อยู่มั้ง) เค้าจะพยายามปรับปรุงตัวเองในทุกวัน เพราะในอนาคตเค้าตั้งแต่คบกันมันมีบี๋อยู่ด้วยเสมอ</textarea>
        </div>
      </div>
    </div>
  </div>

  <!-- วิดีโอ 5 คลิป 8 วิ -->
  <div class="pg" id="p3">
    <div class="si">
      <div class="stit" id="t3">ไปถ่ายรูปด้วยกันให้เกินล้านรูปไปเลย ;D</div>
      <div class="sdiv"></div>
      <div class="vgr" id="vg"></div>
    </div>
  </div>

  <!-- ดอกไม้ รูปเดียว -->
  <div class="pg" id="p4">
    <div class="si">
      <div class="stit" id="t4">🌸</div>
      <div class="sdiv"></div>
      <div class="fsingle">
        <div class="fcard" id="fcard">
          <img src="pic/32.png" alt="ดอกไม้" onerror="this.parentElement.innerHTML='<span class=&quot;ico&quot;>🌸</span><span class=&quot;ftxt&quot;>31.jpg</span>'">
        </div>
        <div class="fmsg">
          <textarea id="fta">ที่บอกว่าผ่านก็เลยนึกถึง แล้วซื้อมาให้
เค้านึกถึงมันตั้งแต่ตื่นนอนแล้ว 🌸💕</textarea>
        </div>
      </div>
    </div>
  </div>

</div>

<script>
/* PARTICLES */
const cvs=document.getElementById('cvs'),ctx=cvs.getContext('2d');
let W,H,pts=[];
function resize(){W=cvs.width=innerWidth;H=cvs.height=innerHeight;pts=[];for(let i=0;i<70;i++)pts.push(mk())}
function mk(){return{x:Math.random()*W,y:Math.random()*H,r:.5+Math.random()*1.4,dx:(Math.random()-.5)*.25,dy:-.15-Math.random()*.35,a:Math.random(),da:.002+Math.random()*.003,hue:Math.random()<.5?330:210}}
function draw(){
  ctx.clearRect(0,0,W,H);
  pts.forEach((p,i)=>{
    ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fillStyle=`hsla(${p.hue},65%,65%,${p.a*.4})`;ctx.fill();
    p.x+=p.dx;p.y+=p.dy;p.a+=p.da;
    if(p.a>1)p.da=-p.da;
    if(p.y<-5||p.a<0)pts[i]=mk();
  });
  requestAnimationFrame(draw);
}
resize();addEventListener('resize',resize);draw();

/* NAV */
let cur=0;
const pgs=document.getElementById('pages');
const nbs=document.querySelectorAll('.nb');
const pi=document.getElementById('pi');
const ovi=document.getElementById('ov');
const dots=document.querySelectorAll('.dots span');
const nums=['01','02','03','04','05'];

function go(n){
  if(n===cur)return;
  ovi.classList.add('on');
  setTimeout(()=>{
    cur=Math.max(0,Math.min(n,4));
    pgs.style.transform=`translateX(-${cur*100}vw)`;
    nbs.forEach((b,i)=>b.classList.toggle('active',i===cur));
    pi.textContent=nums[cur]+' · 05';
    dots.forEach((d,i)=>d.classList.toggle('a',i===cur));
    ['t1','t2','t3','t4'].forEach(id=>{
      const el=document.getElementById(id);
      if(el){el.classList.remove('vis');setTimeout(()=>el.classList.add('vis'),80);}
    });
    ovi.classList.remove('on');
  },180);
}
function next(){go(cur+1)}
function prev(){go(cur-1)}
addEventListener('keydown',e=>{if(e.key==='ArrowRight')next();if(e.key==='ArrowLeft')prev();});
let tx=0;
addEventListener('touchstart',e=>{tx=e.touches[0].clientX},{passive:true});
addEventListener('touchend',e=>{const dx=e.changedTouches[0].clientX-tx;if(Math.abs(dx)>50){dx<0?next():prev();}},{passive:true});

/* PHOTO GRIDS — ดึงจาก pic/1.jpg ... 31.jpg */
function buildPhotos(id,start,end){
  const g=document.getElementById(id);
  for(let i=start;i<=end;i++){
    const c=document.createElement('div');c.className='pc';
    const img=document.createElement('img');
    img.src=`pic/${i}.jpg`;
    img.alt=`ภาพที่ ${i}`;
    img.onerror=()=>{c.innerHTML=`<span class="ico">✦</span><span class="num">${i}</span>`;};
    c.appendChild(img);
    g.appendChild(c);
  }
}
buildPhotos('g1',1,15);
buildPhotos('g2',16,30);

/* VIDEO — ดึงจาก clip/1.mp4 ... 6.mp4 */
const allVideos=[];
function buildVideos(){
  const g=document.getElementById('vg');
  for(let i=1;i<=6;i++){
    const c=document.createElement('div');c.className='vc';
    const v=document.createElement('video');
    v.src=`clip/${i}.mp4`;
    v.muted=true;v.playsInline=true;v.preload='auto';
    Object.assign(v.style,{position:'absolute',inset:0,width:'100%',height:'100%',objectFit:'cover',borderRadius:'7px'});
    v.addEventListener('timeupdate',()=>{if(v.currentTime>=8){v.currentTime=0;v.play().catch(()=>{});}});
    v.onerror=()=>{c.innerHTML=`<span class="ico">🎬</span><span class="num">คลิป ${i}</span>`;};
    allVideos.push(v);
    c.appendChild(v);
    const bar=document.createElement('div');bar.className='vprog';c.appendChild(bar);
    setInterval(()=>{if(!v.paused)bar.style.width=(Math.min(v.currentTime,8)/8*100)+'%';},80);
    g.appendChild(c);
  }
}
buildVideos();

/* เล่นทุกคลิปพร้อมกันเมื่อ user เข้าหน้า 4 (วิดีโอ) */
function startAllVideos(){
  allVideos.forEach(v=>{v.currentTime=0;v.play().catch(()=>{});});
}

/* override go() เพื่อ trigger เมื่อเข้า page 3 */
const _goOrig=go;
go=function(n){
  _goOrig(n);
  if(n===3)setTimeout(startAllVideos,400);
};

/* คลิกที่ใดก็ได้ในหน้าวิดีโอเพื่อ start (fallback) */
document.getElementById('p3').addEventListener('click',startAllVideos,{once:true});

/* SAVE TEXT */
const tmr={};
function sv(el){clearTimeout(tmr[el.id]);tmr[el.id]=setTimeout(()=>{try{localStorage.setItem('av_'+el.id,el.value);}catch(e){}},700);}
document.querySelectorAll('textarea').forEach((t,i)=>{
  if(!t.id)t.id='ta'+i;
  t.addEventListener('input',()=>sv(t));
  try{const v=localStorage.getItem('av_'+t.id);if(v)t.value=v;}catch(e){}
});

/* OBSERVE titles */
const obs=new IntersectionObserver(ens=>{ens.forEach(e=>{if(e.isIntersecting)e.target.classList.add('vis');});},{threshold:.2});
['t1','t2','t3','t4'].forEach(id=>{const el=document.getElementById(id);if(el)obs.observe(el);});
</script>
</body>
